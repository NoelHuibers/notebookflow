<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">NotebookFlow</title>
  <desc id="desc">Visual pipelines for notebooks</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071b1a" />
      <stop offset=".56" stop-color="#0f2928" />
      <stop offset="1" stop-color="#0f3d3a" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity=".24" />
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#5eead4" stroke-width="1" opacity=".08" />
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".45" />
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#background)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <ellipse cx="890" cy="290" rx="430" ry="400" fill="url(#glow)" />

  <g transform="translate(92 108)">
    <path d="M31 29 78 53M31 87 78 63" fill="none" stroke="#5eead4" stroke-width="7" stroke-linecap="round" opacity=".6" />
    <circle cx="23" cy="24" r="15" fill="#2dd4bf" />
    <circle cx="23" cy="92" r="15" fill="#2dd4bf" />
    <circle cx="90" cy="58" r="17" fill="#2dd4bf" />
  </g>
  <text x="92" y="292" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="76" font-weight="750" letter-spacing="-3">NotebookFlow</text>
  <text x="96" y="356" fill="#99f6e4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="500">Visual pipelines for notebooks</text>
  <text x="96" y="418" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="23">Connect cells. See the flow. Run with confidence.</text>

  <g transform="translate(720 118)" filter="url(#shadow)">
    <rect width="374" height="394" rx="28" fill="#102c2b" stroke="#5eead4" stroke-opacity=".22" stroke-width="2" />
    <path d="M96 104 187 176M96 290 187 218M220 197 292 197" fill="none" stroke="#5eead4" stroke-width="6" stroke-linecap="round" opacity=".62" />
    <g fill="#163b39" stroke="#5eead4" stroke-width="3">
      <rect x="36" y="66" width="112" height="74" rx="16" />
      <rect x="36" y="253" width="112" height="74" rx="16" />
      <rect x="174" y="160" width="112" height="74" rx="16" />
    </g>
    <g fill="#ccfbf1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" font-weight="600">
      <text x="59" y="111">load_data</text>
      <text x="56" y="298">clean_data</text>
      <text x="197" y="205">train_model</text>
    </g>
    <g fill="#2dd4bf">
      <circle cx="149" cy="103" r="7" />
      <circle cx="149" cy="290" r="7" />
      <circle cx="174" cy="197" r="7" />
      <circle cx="286" cy="197" r="7" />
      <circle cx="305" cy="197" r="9" />
    </g>
  </g>
</svg>
