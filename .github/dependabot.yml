# Weekly dependency update PRs (#82). One ecosystem per surface:
# - npm: the pnpm workspace root (covers all packages/* via the lockfile)
# - pip: the engine's uv-managed Python project
# - github-actions: the workflows themselves
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "pip"
    directory: "/engine"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
