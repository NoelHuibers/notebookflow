# Fly.io config for the NotebookFlow engine.
#
# Deploy with:
#   fly auth login
#   fly launch --no-deploy        # first time — creates the app, keeps this fly.toml
#   fly deploy
#
# WebSocket routing works out of the box on Fly's http_service. The engine
# binds 0.0.0.0:$PORT inside the container; Fly's edge terminates TLS and
# proxies wss:// from the public hostname.

app = "notebookflow-engine"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8765"

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
