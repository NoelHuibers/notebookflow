# fly.toml app configuration file generated for notebookflow-engine on 2026-05-24T21:51:52+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'notebookflow-engine'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8765'
  # CORS: only the hosted web app may call this engine from a browser
  # (comma-separated; unset = open, the self-host default).
  NOTEBOOKFLOW_ALLOWED_ORIGINS = 'https://notebookflow.app'

[http_service]
  internal_port = 8765
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
